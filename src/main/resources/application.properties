# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=voidforum
# Was false: User.username/email (@Indexed unique=true) and Vote's compound
# unique index were declared but never actually created in MongoDB, so none
# of those uniqueness constraints were enforced at write time. Re-enabled so
# Spring Data actually creates them on startup, matching what the model
# annotations already claim. NOTE: if duplicate usernames/emails or votes
# already exist in the live Atlas database, index creation will fail and the
# app won't start — run VoteController's POST /api/votes/cleanup first for
# vote duplicates; there's no equivalent repair tool for User yet, so check
# for duplicate usernames/emails manually before deploying this.
spring.data.mongodb.auto-index-creation=true
# Application Name
spring.application.name=voidforum

# Logging
logging.level.org.springframework.data.mongodb=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}