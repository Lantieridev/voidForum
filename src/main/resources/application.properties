# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/voidforum
spring.data.mongodb.database=voidforum

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

# Application Name
spring.application.name=voidforum

# Logging
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.data.redis=INFO

# JWT Configuration
jwt.secret=your-256-bit-secret-key-here-must-be-at-least-32-characters-long
jwt.expiration=86400000